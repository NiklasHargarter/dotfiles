site_name: Niklas' Dotfiles
theme:
  name: material
  palette:
    scheme: slate # Dark mode by default
    primary: indigo
  features:
    - content.code.copy # Enables the "Copy to Clipboard" button
    - navigation.sections
    - navigation.expand

nav: 
  - Home: index.md
  - ZSH: zsh.md
  - SSH: ssh.md
  - GIT: git.md
  - NVIM: nvim.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
